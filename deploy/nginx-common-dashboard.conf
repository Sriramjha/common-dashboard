# Listen on HTTP only (no TLS). Restrict access with AWS Security Group (e.g. VPN egress /32).
# Install: sudo cp deploy/nginx-common-dashboard.conf /etc/nginx/sites-available/common-dashboard
#          sudo ln -sf /etc/nginx/sites-available/common-dashboard /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8765;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
